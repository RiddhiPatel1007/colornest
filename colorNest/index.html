<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Nest website</title>
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="section-navbar">
        <section class="container">
            <div class="navbar_logo">
                 <img src="images/logocolornest.png" alt="ColorNest logo"
                  >
            </div>
            <div class="search-menu">
                <div class="inputdiv">
                   <i class="fa-solid fa-magnifying-glass"></i>
                     <input type="text" class="inputValue" placeholder="Search palettes">
                </div>
                 <button class="menu-btn">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                 </button>
            </div>
            <div id="colorFilters">
                    <button onclick="filterColor('blue')">Blue</button>
                    <button onclick="filterColor('red')">Red</button>
                    <button onclick="filterColor('green')">Green</button>
                    <button onclick="filterColor('yellow')">Yellow</button>
                    <button onclick="filterColor('purple')">Purple</button>
                    <button onclick="filterColor('orange')">Orange</button>
                    <button onclick="filterColor('pink')">Pink</button>
                    <button onclick="filterColor('white')">White</button>
                    <button onclick="filterColor('black')">Black</button>
                    <button onclick="showAll()">All</button>
                </div>
            <div class="navbar">
                <ul id="mobileMenu">
                    <li class="nav-item" id="palettesBtn"> 
                        <a class="nav-link" href="index.html">Palettes</a>
                    </li>
                   <li class="nav-item"> 
                        <a class="nav-link" href="create.html">Create</a>
                    </li>                   
                    <li class="nav-item"> 
                        <a class="nav-link" href="collection.html">Collection</a>
                    </li>
                     <li class="nav-item"> 
                        <a class="nav-link" href="about.html">About</a>
                    </li> 
                </ul>
            </div>
        </section>
    </header>


<main class="section-card ">
   <div class="container">  
    <section class="palette-Section"  id="sectionPalettes">        
                  
    </section>
</div>
</main>

    <script src="script.js"></script>
</body>
</html>
