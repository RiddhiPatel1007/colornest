<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>s
    
<header class="section-navbar">
        <section class="container">
            <div class="navbar_logo">
                 <img src="images/logocolornest.png" alt="ColorNest logo"
                >
            </div>
           <div class="search-menu">

                <div class="inputdiv"s>
                   <i class="fa-solid fa-magnifying-glass"></i>
                     <input type="text" class="inputValue" placeholder="Search palettes">
                </div>

                 <button class="menu-btn">
                    <i class="fa-solid fa-ellipsis-vertical"></i>
                 </button>

            </div>
            <div id="colorFilters">
                    <button onclick="filterColor('blue')">Blue</button>
                    <button onclick="filterColor('red')">Red</button>
                    <button onclick="filterColor('green')">Green</button>
                    <button onclick="filterColor('yellow')">Yellow</button>
                    <button onclick="filterColor('purple')">Purple</button>
                    <button onclick="filterColor('orange')">Orange</button>
                    <button onclick="filterColor('pink')">Pink</button>
                    <button onclick="filterColor('white')">White</button>
                    <button onclick="filterColor('black')">Black</button>
                    <button onclick="showAll()">All</button>
                </div>
            <div class="navbar">
                <ul id="mobileMenu">
                    <li class="nav-item" id="palettesBtn"> 
                        <a class="nav-link" href="index.html">Palettes</a>
                    </li>
                   <li class="nav-item"> 
                        <a class="nav-link" href="create.html">Create</a>
                    </li>                   
                    <li class="nav-item"> 
                        <a class="nav-link" href="collection.html">Collection</a>
                    </li>
                     <li class="nav-item"> 
                        <a class="nav-link" href="about.html">About</a>
                    </li> 
                </ul>
            </div>
        </section>
    </header>
<div class="section-create"> 
    <div class="container "> 
        <div class="create-box"> 
             <h2 class="heading" >New Color Palette</h2>
             <p class="subheading">Create a new palette and contribute to ColorNest ’s collection</p>
           
             <div class="palette" id="palette">
                <div class="box">
                    <span class="code-color">#FFFFFF</span>
                </div>
                <div class="box">
                    <span class="code-color">#FFFFFF</span>
                </div>
                <div class="box">
                    <span class="code-color">#FFFFFF</span>
                </div>
            </div>
            <button class="btn" id="addColorBtn">send palette</button>

            <input type="color" id="colorPicker" style="opacity:0; position:absolute;">
        </div>
        </div>
</div>

<script>





const palette = document.getElementById("palette");
const addColorBtn = document.getElementById("addColorBtn");
const colorPicker = document.getElementById("colorPicker");
const palettes = document.querySelectorAll(".palette-wrapper");

if(palettes.length === 0){
    return;
}
let activeBox = null;

// Existing boxes
document.addEventListener("click", (e) => {

    if(e.target.classList.contains("box")){
                console.log("Box clicked");

        activeBox = e.target;
        colorPicker.click();

    }

});
// Change Color
colorPicker.addEventListener("input", () => {

    if(activeBox){

        activeBox.style.backgroundColor =
        colorPicker.value;

        let hexCode =
        activeBox.querySelector(".code-color");

        hexCode.textContent =
        colorPicker.value.toUpperCase();
    }
});
const saveBtn =
document.getElementById("addColorBtn");

saveBtn.addEventListener("click", () => {

    const colors = [];
    document.querySelectorAll(".create-box .box")
    .forEach(box => {
        colors.push(
            box.querySelector(".code-color")
            .textContent
        );
    });
    console.log(colors);

    let savedPalettes =
    JSON.parse(localStorage.getItem("savedPalettes"))
    || [];
    savedPalettes.push(colors);
    localStorage.setItem(
        "savedPalettes",
        JSON.stringify(savedPalettes)
    );
    alert("Palette Saved!");
});

const menuBtn = document.querySelector(".menu-btn");
const mobileMenu = document.getElementById("mobileMenu");

menuBtn.addEventListener("click", () => {
    mobileMenu.classList.toggle("show");
});

document.addEventListener("click", (e) => {

    if(e.target.classList.contains("code-color")){

        navigator.clipboard.writeText(
            e.target.textContent
        );
        let oldText = e.target.textContent;

        e.target.textContent = "Copied!";

        setTimeout(() => {
            e.target.textContent = oldText;
        }, 1000);
    }

});

</script>
</body>
</html>
